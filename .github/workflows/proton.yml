name: Build Proton-Clang 13 Native AArch64 (Full Fix)

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Pasang Dependencies & Cross-Compiler
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build build-essential python3 git \
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libncurses5-dev wget

    - name: Clone LLVM Project
      run: |
        git clone https://github.com/llvm/llvm-project.git --depth=1 -b llvmorg-13.0.0
        mkdir -p install

    - name: Build Native TableGen (Alat Pahat Intel)
      run: |
        cd llvm-project
        mkdir build-native && cd build-native
        # Kita cuma build tool minimalis agar GitHub bisa jalanin prosesnya
        cmake -G Ninja ../llvm \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_TARGETS_TO_BUILD="AArch64" \
          -DLLVM_ENABLE_PROJECTS="clang"
        ninja llvm-tblgen clang-tblgen

    - name: Konfigurasi Cross-Compile (Cetak Binary ARM64)
      run: |
        cd llvm-project
        mkdir build-cross && cd build-cross
        # Di sini kita pakai alat dari Step 1 tadi
        cmake -G Ninja ../llvm \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;lld;polly" \
          -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
          -DCMAKE_SYSTEM_NAME=Linux \
          -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
          -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
          -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
          -DLLVM_HOST_TRIPLE=aarch64-unknown-linux-gnu \
          -DCLANG_VENDOR="Proton-AArch64-Native" \
          -DCMAKE_INSTALL_PREFIX=../../install \
          -DLLVM_TABLEGEN=$(pwd)/../build-native/bin/llvm-tblgen \
          -DCLANG_TABLEGEN=$(pwd)/../build-native/bin/clang-tblgen \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
          -DCMAKE_C_FLAGS="-Wno-unused-but-set-variable -Wno-error" \
          -DCMAKE_CXX_FLAGS="-Wno-unused-but-set-variable -Wno-error"

    - name: Kompilasi LLVM Final (AArch64 Native)
      run: |
        cd llvm-project/build-cross
        # -j2 biar RAM 7GB GitHub gak jebol
        ninja -j2 install

    - name: Upload ke Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: proton-clang-bin
        path: proton-clang-13-aarch64.tar.gz

    - name: Packing & Release
      run: |
        tar -czvf proton-clang-13-native.tar.gz install/
        
    - name: Create Release & Upload
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_id }}
        name: Proton-Clang 13 Native AArch64 (Fix Error 126)
        files: proton-clang-13-native.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

