name: Build Proton-Clang 13 AArch64

on:
  workflow_dispatch: # Biar bisa diklik manual

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Pasang Dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake ninja-build build-essential python3 python3-distutils \
          libssl-dev libelf-dev zlib1g-dev libncurses5-dev git

    - name: Clone LLVM Project
      run: |
        git clone https://github.com/llvm/llvm-project.git --depth=1 -b llvmorg-13.0.0
        cd llvm-project
        # Tambahkan folder buat hasil install
        mkdir -p ../install

    - name: Konfigurasi CMake (With Fixes)
      run: |
        cd llvm-project
        mkdir build && cd build
        cmake -G Ninja ../llvm \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_ENABLE_PROJECTS="clang;lld;polly" \
          -DLLVM_TARGETS_TO_BUILD="AArch64;ARM" \
          -DCLANG_VENDOR="Proton-AArch64-Custom" \
          -DCMAKE_INSTALL_PREFIX=../../install \
          -DLLVM_INCLUDE_BENCHMARKS=OFF \
          -DLLVM_ENABLE_TERMINFO=OFF \
          -DLLVM_STATIC_LINK_CXX_STDLIB=ON \
          -DCMAKE_C_FLAGS="-Wno-unused-but-set-variable -Wno-error" \
          -DCMAKE_CXX_FLAGS="-Wno-unused-but-set-variable -Wno-error" \
          -DLLVM_BUILD_LLVM_DYLIB=ON \
          -DLLVM_LINK_LLVM_DYLIB=ON

    - name: Mulai Kompilasi
      run: |
        cd llvm-project/build
        ninja install

    - name: Kompres Hasil Build
      run: |
        tar -czvf proton-clang-13-aarch64.tar.gz install/

    - name: Upload ke Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: proton-clang-bin
        path: proton-clang-13-aarch64.tar.gz

    - name: Create Release & Upload
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG_NAME }}
        name: Proton-Clang 13 Ultimate Build ${{ env.TAG_NAME }}
        files: proton-clang-13-ultimate.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
